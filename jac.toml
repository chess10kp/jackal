[plugins.mcp]
# Restrict Jac MCP exposure for Jackal to the minimal curated set.
# Keep only capabilities needed by docs/jackal_mcp_reference.md (X-marked tools).

# Needed by jac_validate_jac / jac_check_syntax
enable_validate = true

# Not X-marked
enable_format = false
enable_py2jac = false

# Needed by jac_get_ast
enable_ast = true

# Needed by jac_search_docs
expose_docs = true

# Not X-marked (disables list_examples / get_example)
expose_examples = false

# Not needed for Jackal MCP reference
expose_grammar = false
expose_pitfalls = false
